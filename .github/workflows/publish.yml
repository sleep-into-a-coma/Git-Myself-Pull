name: Publish

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Check updater signing secrets
        id: signing
        shell: pwsh
        env:
          SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          SIGNING_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $configured = ![string]::IsNullOrWhiteSpace($env:SIGNING_KEY) -and ![string]::IsNullOrWhiteSpace($env:SIGNING_PASSWORD)
          "configured=$($configured.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          if (!$configured) {
            Write-Warning "Updater signing secrets are not configured; cloud publishing is skipped"
          }

      - uses: actions/checkout@v4
        if: steps.signing.outputs.configured == 'true'

      - uses: pnpm/action-setup@v4
        if: steps.signing.outputs.configured == 'true'
        with:
          version: 10

      - uses: actions/setup-node@v4
        if: steps.signing.outputs.configured == 'true'
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        if: steps.signing.outputs.configured == 'true'

      - run: pnpm install --frozen-lockfile
        if: steps.signing.outputs.configured == 'true'

      - uses: tauri-apps/tauri-action@v1
        if: steps.signing.outputs.configured == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: Git Auto Pull v__VERSION__
          releaseBody: Git Auto Pull 自动更新版本
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
